<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <h1>NOSENCE converter</h1>
    </head>
    <body>
        <div>
        <textarea id="input"></textarea>
        <img src="https://blob.gifcities.org/gifcities/6BLKTBDOPQVVPVLK3F4L4DOIPT24UXVF.gif" id="arrow">
        <textarea id="output"></textarea>
        </div>
        <h2>convert words to random number</h2>
    </body>
</html>
<script>

    document.getElementById("arrow").addEventListener("click", function () {
        let all_text = "";
        let output = "";
        all_text = document.getElementById("input").value;
        for (let x of all_text) {
            if (x == " "){
                output = output + " ";
            }else{
                output = output + Math.floor(Math.random() * 9);
            }

        }
        document.getElementById("output").value = output;

});
</script>
